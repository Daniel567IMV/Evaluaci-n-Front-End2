<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Colaboradores</title>
    <link rel="stylesheet"  href="style.css">
</head>
<body>
    <h1>Gestión de Colaboradores</h1>
    <section>
        <h2>Nuevo Registro</h2>
        <form id="formularioRegistro">
            <div>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" placeholder="Ingrese el nombre">
            
            </div>
            <br>
            <div>
                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" placeholder="Ingrese el apellido">
            </div>
            <br>
            <div>
                <label for="cargo">Cargo:</label>
                <input type="text" id="cargo" placeholder ="Ingrese el cargo: Ejemplo: Gerente, Analista, etc.">
            </div>
            <br>
            <div>
                <label for="email">Correo Corporativo:</label>
                <input type="email" id="email" placeholder="usuario@empresa.cl">
            </div>
            <br>
        </form>
    </section>
    
</body>
</html>
